services:
  # ── Backend API (OAuth code/token proxy) ──
  - type: web
    name: deriv-bot-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: DERIV_APP_ID
        sync: false
      - key: DERIV_APP_SECRET
        sync: false
      - key: DERIV_AUTH_URL
        value: https://auth.deriv.com/oauth2/auth
      - key: DERIV_TOKEN_URL
        value: https://auth.deriv.com/oauth2/token

  # ── Frontend static site ──
  - type: web
    name: deriv-bot-frontend
    env: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
